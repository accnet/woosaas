services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-woosaas_secret}
      POSTGRES_DB: ${POSTGRES_DB:-woosaas}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/migrations_postgres/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:23.11-alpine
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-woosaas}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-woosaas_secret}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./api/migrations/clickhouse:/docker-entrypoint-initdb.d:ro
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_PORT:-9000}:9000"
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --host 127.0.0.1 --query 'SELECT 1' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: api
    environment:
      PORT: ${PORT:-8080}
      HOST: ${HOST:-0.0.0.0}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-development-use-a-longer-secret}
      JWT_EXPIRY: ${JWT_EXPIRY:-24h}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-woosaas_secret}
      POSTGRES_DB: ${POSTGRES_DB:-woosaas}
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST:-clickhouse}
      CLICKHOUSE_PORT: "9000"
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-woosaas_secret}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-woosaas}
      CLICKHOUSE_DEBUG: ${CLICKHOUSE_DEBUG:-false}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: "6379"
    ports:
      - "${PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: worker
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-woosaas_secret}
      POSTGRES_DB: ${POSTGRES_DB:-woosaas}
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST:-clickhouse}
      CLICKHOUSE_PORT: "9000"
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-woosaas_secret}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-woosaas}
      CLICKHOUSE_DEBUG: ${CLICKHOUSE_DEBUG:-false}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: "6379"
      WORKER_BATCH_SIZE: ${WORKER_BATCH_SIZE:-1000}
      WORKER_FLUSH_INTERVAL: ${WORKER_FLUSH_INTERVAL:-2}
      WORKER_MAX_RETRIES: ${WORKER_MAX_RETRIES:-3}
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  migrate:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: migrate
    profiles: ["tools"]
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-woosaas_secret}
      POSTGRES_DB: ${POSTGRES_DB:-woosaas}
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST:-clickhouse}
      CLICKHOUSE_PORT: "9000"
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-woosaas_secret}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-woosaas}
      CLICKHOUSE_DEBUG: ${CLICKHOUSE_DEBUG:-false}
    command: ["./migrate", "-up"]
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.status < 500 ? 0 : 1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  clickhouse_data:
  redis_data:
